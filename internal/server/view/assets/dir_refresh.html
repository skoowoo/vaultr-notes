<span id="dir-note-count-head" class="s-count" hx-swap-oob="true">{{.Count}}</span>
<div id="dir-notes-grid" class="card-grid" hx-swap-oob="true">
  {{- range .Notes}}
  <div class="card">
    <div class="card-a"
         @click="__vaultrOpenNote($event.currentTarget)"
         data-note-path="{{.Path}}"
         data-note-title="{{label .}}"
         data-note-is-knowledge="{{.IsKnowledge}}"
         data-note-is-index="{{.IsIndex}}"
         data-note-can-compile="{{.CanCompile}}"
         data-note-pinned="{{.Pinned}}">
      <span class="card-title">{{label .}}</span>
      <div class="card-foot">
        <span class="card-meta">{{.UpdatedAt}}</span>
        {{if .IsKnowledge}}<span class="card-ai">k</span>{{end}}
        {{if .IsShort}}<span class="card-short">s</span>{{end}}
        {{if .IsIndex}}<span class="card-index">i</span>{{end}}
        {{if .IsCompiled}}<span class="card-compiled"><svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="9" height="9"><path d="M20 6 9 17l-5-5"/></svg></span>{{end}}
      </div>
    </div>
  </div>
  {{- end}}
  {{- if .NextNs}}
  <div class="dir-load-sentinel"
       hx-get="/dir/notes?path={{encdir .DirPath}}&before={{.NextNs}}"
       hx-trigger="intersect once"
       hx-swap="outerHTML"></div>
  {{- end}}
  {{- if not .Notes}}<div class="grid-empty">No notes in this folder</div>{{end}}
</div>
