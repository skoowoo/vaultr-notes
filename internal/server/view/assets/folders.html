<div class="home-container">
  <!-- Hero -->
  <div class="home-hero-wrapper">
    <section class="home-hero" aria-label="Folders">
      <div class="home-hero-row">
        <div class="home-hero-copy">
          <h1 class="home-hero-title">ALL FOLDERS</h1>
          <p class="home-hero-lede">{{.TotalCount}} total &middot; {{.SystemCount}} system</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Grid -->
  <div class="home-content">
    <main class="home-left">
      <div class="feed">
        <div>
          <div class="s-head">
            <span class="s-label">ALL FOLDERS</span>
            <span class="s-count">{{.TotalCount}}</span>
          </div>
          <div class="card-grid card-grid--folder">
            {{range .Folders}}
            <div class="folder-card" {{if .IsSystem}}data-system{{end}} data-dir="{{.Dir}}"
              onclick="location.href='/dir?path='+encodeURIComponent(this.dataset.dir)+'&from=folders'">
              <div class="folder-card-header">
                <span class="folder-card-initial">{{folderInitial .Dir}}</span>
              </div>
              <div class="folder-card-body">
                <span class="folder-card-name">{{.Label}}</span>
                <span class="folder-card-count">{{.Count}} notes</span>
              </div>
            </div>
            {{end}}
            {{if not .Folders}}
            <div class="grid-empty">No folders</div>
            {{end}}
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
